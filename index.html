<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApolloGPT | Auto-Free</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-panel: rgba(20, 25, 40, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #e6e9ef;
      --text-muted: #8b92a5;
      --accent-1: #6366f1;
      --accent-2: #06b6d4;
      --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
      --bot-bubble: rgba(30, 35, 50, 0.8);
      --glow: 0 0 20px rgba(99, 102, 241, 0.3);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app-container {
      position: relative; z-index: 1; width: 95%; max-width: 800px; height: 90vh;
      display: flex; flex-direction: column; background: var(--bg-panel);
      backdrop-filter: blur(20px); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .header { padding: 16px; border-bottom: 1px solid var(--border); text-align: center; flex-shrink: 0; }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .highlight { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .chat-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    .model-selector { 
      padding: 8px 16px; border-bottom: 1px solid var(--border); 
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem; color: var(--text-muted);
    }
    
    select { 
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
      color: #fff; padding: 4px 8px; border-radius: 6px; outline: none;
    }

    .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 0.92rem; line-height: 1.5; word-wrap: break-word; }
    .message.user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 2px; white-space: pre-wrap; }
    .message.bot { align-self: flex-start; background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

    /* ── Markdown styles inside bot bubbles ── */
    .message.bot h1 { font-size: 1.3rem; font-weight: 700; margin: 0.6em 0 0.3em; }
    .message.bot h2 { font-size: 1.1rem; font-weight: 600; margin: 0.6em 0 0.3em; }
    .message.bot h3 { font-size: 1rem; font-weight: 600; margin: 0.5em 0 0.25em; }
    .message.bot p  { margin: 0.4em 0; }
    .message.bot p:first-child { margin-top: 0; }
    .message.bot p:last-child  { margin-bottom: 0; }
    .message.bot strong { font-weight: 600; color: #fff; }
    .message.bot em { font-style: italic; color: #c4c8d8; }
    .message.bot ul, .message.bot ol { padding-left: 1.4em; margin: 0.4em 0; }
    .message.bot li { margin: 0.15em 0; }
    .message.bot code {
      font-family: 'Fira Code', 'Consolas', monospace;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.85em;
    }
    .message.bot pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .message.bot pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.83em;
    }
    .message.bot blockquote {
      border-left: 3px solid var(--accent-1);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 0.4em 0;
    }
    /* Tables */
    .message.bot table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.6em 0;
      font-size: 0.88em;
    }
    .message.bot th {
      background: rgba(99,102,241,0.2);
      color: #fff;
      font-weight: 600;
      text-align: left;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .message.bot td {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--text-main);
    }
    .message.bot tr:nth-child(even) td {
      background: rgba(255,255,255,0.03);
    }
    /* Horizontal rule */
    .message.bot hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.6em 0;
    }

    .input-area { 
      padding: 16px; background: rgba(10, 15, 25, 0.5); border-top: 1px solid var(--border); 
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }

    textarea { 
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
      border-radius: 10px; padding: 12px; color: #fff; resize: none; outline: none; 
      max-height: 120px; font-family: inherit;
    }

    button#sendBtn { 
      width: 42px; height: 42px; border: none; border-radius: 10px; 
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); 
      color: white; cursor: pointer; font-size: 1.2rem;
    }

    .file-list { font-size: 10px; color: #aaa; padding: 10px 20px; background: rgba(0,0,0,0.2); border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); }
    .file-list summary { cursor: pointer; color: var(--accent-2); margin-bottom: 5px; }

    /* Typing animation */
    .typing {
      display: inline-block;
    }
    .typing::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="logo">Apollo<span class="highlight">GPT</span></div>
  </div>
  
  <div class="chat-wrapper">
    <div class="model-selector">
      <span id="status">🔄 Loading...</span>
      <select id="modelSelect">
        <option value="openai">OpenAI (Fast)</option>
        <option value="mistral">Mistral</option>
        <option value="searchgpt">SearchGPT</option>
      </select>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">👋 Ready to search your knowledge base! Ask me anything.</div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Ask about about.txt or other files..." rows="1"></textarea>
      <button id="sendBtn">➤</button>
    </div>

    <details class="file-list">
      <summary>📁 Knowledge Sources</summary>
      <div id="file-list-content">Scanning folder...</div>
    </details>
  </div>
</div>

<script>
  const messagesContainer = document.getElementById('messages');
  const sendButton = document.getElementById('sendBtn');
  const userInput = document.getElementById('userInput');
  const statusText = document.getElementById('status');
  const fileListContent = document.getElementById('file-list-content');

  // Configure marked options
  marked.setOptions({
    breaks: true,      // treat single newlines as <br>
    gfm: true          // GitHub Flavored Markdown (tables, strikethrough, etc.)
  });

  let allKnowledgeChunks = [];
  const FOLDER_PATH = "knowledge/";
  const LIST_FILE = FOLDER_PATH + "filelist.txt";

  // LOAD KNOWLEDGE
  async function init() {
    try {
      // 1. Fetch the index file
      const resp = await fetch(LIST_FILE);
      if (!resp.ok) throw new Error("Could not find filelist.txt");
      
      const listText = await resp.text();
      const filenames = listText.split("\n")
                                .map(f => f.trim())
                                .filter(f => f !== "" && !f.startsWith("#"));

      let fullText = "";
      let loadedCount = 0;

      // 2. Loop through every file mentioned in filelist.txt
      for (const filename of filenames) {
        try {
          const res = await fetch(FOLDER_PATH + filename);
          if (res.ok) {
            const content = await res.text();
            fullText += `\n--- SOURCE: ${filename} ---\n${content}\n`;
            loadedCount++;
          }
        } catch (e) { console.error("Error loading " + filename, e); }
      }

      allKnowledgeChunks = splitTextIntoChunks(fullText, 800, 150);
      fileListContent.innerText = filenames.map(f => `📄 ${f}`).join('\n');
      statusText.innerText = `✅ Loaded ${loadedCount} files`;
    } catch (err) {
      statusText.innerText = "⚠️ knowledge/filelist.txt missing";
      statusText.style.color = "#ff4444";
    }
  }

  function splitTextIntoChunks(text, size, overlap) {
    const chunks = [];
    let i = 0;
    while (i < text.length) {
      chunks.push(text.substring(i, i + size));
      i += size - overlap;
    }
    return chunks;
  }

  function getRelevantContext(query) {
    const words = query.toLowerCase().split(/\W+/).filter(w => w.length > 2);
    return allKnowledgeChunks
      .map(chunk => ({
        text: chunk,
        score: words.reduce((acc, word) => acc + (chunk.toLowerCase().includes(word) ? 1 : 0), 0)
      }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .filter(item => item.score > 0)
      .map(item => item.text)
      .join("\n\n---\n\n");
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = `message bot typing`;
    div.innerHTML = '<span class="typing"></span>';
    div.id = "typingIndicator";
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function removeTypingIndicator() {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    addMessage('user', text);

    // Show typing animation
    addTypingIndicator();

    const context = getRelevantContext(text);
    const systemPrompt = `You are ApolloGPT. Use the provided knowledge to answer. If not found, say you don't know.\n\nKNOWLEDGE BASE:\n${context || "No relevant info found."}`;

    try {
      const response = await fetch("https://text.pollinations.ai/openai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: text }
          ],
          model: document.getElementById('modelSelect').value
        })
      });

      const data = await response.json();
      removeTypingIndicator();
      addMessage('bot', data.choices[0].message.content);
    } catch (err) {
      removeTypingIndicator();
      addMessage('bot', "❌ API Error: " + err.message);
    }
  }

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'bot') {
      // Render markdown for bot messages
      div.innerHTML = marked.parse(content);
    } else {
      // Keep user messages as plain text
      div.innerText = content;
    }
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  sendButton.onclick = sendMessage;
  userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  window.onload = init;
</script>

</body>
</html>
